<div class="content-wrapper">
  <div class="page-header">
    <h3 class="page-title"> Cart </h3>
    <!-- <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Cart</a></li>
        <li class="breadcrumb-item active" aria-current="page">Edit Cart</li>
      </ol>
    </nav> -->
  </div>
  <div class="row justify-content-center">
    <div class="col-xxl-5 col-xl-6 col-lg-8 col-md-8 col-sm-10 col-12 grid-margin stretch-card">
      <div class="card">
        <div class="card-body">
          <h4 class="card-title" *ngIf="id">Edit Cart</h4>
          <h4 class="card-title" *ngIf="!id">Add New Cart</h4>
          <div class="alert alert-success alert-dismissable" style="margin-left: 0;" *ngIf="msg_success">
            {{throw_msg}}
          </div>
          <div class="alert alert-danger alert-dismissable" style="margin-left: 0;" *ngIf="msg_danger">
            {{throw_msg}}
          </div>
          <!-- form start -->
          <form [formGroup]="addCartForm" (ngSubmit)="onSubmit()" method="post" novalidate>
            <div class="box-body">
              <div class="form-group col-md-12">
                <label for="exampleInputEmail1">Product</label>
                <select name="product_id" #product formControlName="product_id" class="form-control"
                  (change)="selectProduct(product.value)">
                  <option value="">Select Product</option>
                  <option value="{{product._id}}" *ngFor="let product of allproducts; let j = index">
                    {{product.name}}</option>
                </select>
                <span *ngIf="submitted && hasError('product_id','required')" class="alert-danger">Product is
                  required</span>
              </div>
              <div class="form-group col-md-12">
                <label for="exampleInputEmail1">Customer</label>
                <select name="customer" formControlName="customer" class="form-control">
                  <option value="">Select Customer</option>
                  <option value="{{customer._id}}" *ngFor="let customer of allusers; let j = index">
                    {{customer.username}}</option>
                </select>
                <span *ngIf="submitted && hasError('customer','required')" class="alert-danger">Customer is
                  required</span>
              </div>
              <div class="form-group col-md-12">
                <label for="exampleInputEmail1">Quantity</label>
                <input type="number" name="qty" autocomplete="off" formControlName="qty" class="form-control"
                  placeholder="Quantity">
                <span *ngIf="submitted && hasError('qty','required')" class="alert-danger">Quantity is required</span>
              </div>
              <div class="form-group col-md-12">
                <label for="exampleInputEmail1">Price</label>
                <input type="number" name="price" autocomplete="off" formControlName="price" class="form-control"
                  placeholder="Price">
                <span *ngIf="submitted && hasError('price','required')" class="alert-danger">Price is required</span>
              </div>
            </div>
            <div class="col-12">
              <div class="box-footer d-flex">
                <button type="submit" class="btn btn-button mr-2">Submit</button>
                <button type="cancel" (click)="onCancel()" class="btn btn-button">Cancel</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
