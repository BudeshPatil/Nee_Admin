<div class="content-wrapper" >
	<div class="page-header">
		<h3 class="page-title"> Attribute </h3>
	</div>
	<div class="row justify-content-center">
    <div class="col-md-8 col-sm-10 col-12 grid-margin stretch-card">
      <div class="card">
				<div class="card-header">
					<h4 class="card-title mb-0" *ngIf="id">Edit Attribute</h4>
          <h4 class="card-title mb-0" *ngIf="!id">Add New Attribute</h4>
				</div>
        <div class="card-body">
        
          <div class="alert alert-success alert-dismissable" style="margin-left: 0;" *ngIf="msg_success">
						{{throw_msg}}
					</div>
					<div class="alert alert-danger alert-dismissable" style="margin-left: 0;" *ngIf="msg_danger">
						{{throw_msg}}
					</div>
					<!-- form start -->
					<form [formGroup]="addattributeForm" (ngSubmit)="onSubmit()" method="post" novalidate>
						<div class="form-group">
							<label for="exampleInputEmail1">Name</label>
							<input type="text" name="name" autocomplete="off" formControlName="name" class="form-control"
								placeholder="Attribute Name">
							<span *ngIf="submitted && hasError('name','required')" class="alert-danger">Attribute Name is
								required</span>
						</div>
						<div class="form-group">
							<label for="exampleInputEmail1">Status</label>
							<select name="status" formControlName="status" class="form-control">
								<option value="">Select Status</option>
								<option value="true">Active</option>
								<option value="false">Deactive</option>
							</select>
							<span *ngIf="submitted && hasError('status','required')" class="alert-danger">Please Select Status</span>
						</div>	
						<div class="form-group">
							<div class="d-lg-flex d-md-block d-sm-block d-block" style="flex-wrap: wrap;">
								<div>
									<h4 class="mt-xl-2 mt-lg-2 mt-md-2 mt-sm-2 mt-2">Selected Attributes</h4>
									<cdk-drop #listOne [connectedTo]="[listTwo]" class="list-sorted" (dropped)="addToList($event)" [data]="selectedAttribute">
										<div *ngFor="let item of selectedAttribute" cdkDrag class="list-sorted__item">{{item.name}}</div>
									</cdk-drop>
								</div>

								<div>
									<h4 class="mt-xl-2 mt-lg-2 mt-md-2 mt-sm-2 mt-2">Available Attributes</h4>
									<cdk-drop #listTwo [connectedTo]="[listOne]" class="list-sorted" (dropped)="addToList($event)" [data]="attribute">
										<div *ngFor="let attr of attribute" cdkDrag class="list-sorted__item">{{attr.name}}</div>
									</cdk-drop>
								</div>

							</div>	
						</div>				
						<div class="box-footer d-flex">
							<button type="submit" class="btn btn-button mr-2">Submit</button>
							<button type="cancel" (click)="onCancel()" class="btn btn-button">Cancel</button>
						</div>
					</form>
					
				</div>
			</div>
		</div>
	</div>
</div>
