<div class="content-wrapper">
	<div class="page-header">
		<h3 class="page-title"> Reason </h3>
		<!-- <nav aria-label="breadcrumb">
			<ol class="breadcrumb">
				<li class="breadcrumb-item"><a href="#">Reason</a></li>
				<li class="breadcrumb-item active" aria-current="page">Edit Reason</li>
			</ol>
		</nav> -->
	</div>
	<div class="row justify-content-center">
		<div class="col-md-8 col-sm-10 col-12 grid-margin stretch-card">
			<div class="card">
				<div class="card-header">
					<h4 class="card-title mb-0" *ngIf="id">Edit Reason</h4>
					<h4 class="card-title mb-0" *ngIf="!id">Add New Reason</h4>
				</div>
				<div class="card-body">

					<div class="alert alert-success alert-dismissable" style="margin-left: 0;" *ngIf="msg_success">
						{{throw_msg}}
					</div>
					<div class="alert alert-danger alert-dismissable" style="margin-left: 0;" *ngIf="msg_danger">
						{{throw_msg}}
					</div>
					<!-- form start -->
					<form [formGroup]="addreasonForm" (ngSubmit)="onSubmit()" method="post" novalidate>
						<div class="form-group col-md-6">
							<label for="exampleInputEmail1">Title</label>
							<input type="text" name="name" autocomplete="off" formControlName="name" class="form-control"
								placeholder="Title">
							<span *ngIf="submitted && hasError('name','required')" class="alert-danger">Reason Name is required</span>
						</div>
						<div class="form-group col-md-6">
							<label for="exampleInputEmail1">Select Status</label>
							<select name="status" formControlName="status" class="form-control">
								<option value="">Select Status</option>
								<option value="true">Active</option>
								<option value="false">Deactive</option>
							</select>
							<span *ngIf="submitted && hasError('status','required')" class="alert-danger">Please Select Status</span>
						</div>
						<div class="form-group col-md-6">
							<div class="box-footer d-flex">
								<button type="submit" class="btn btn-button mr-2">Submit</button>
								<button type="cancel" class="btn btn-button" routerLink="/return/view-reason">Cancel</button>
							</div>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
