<div class="content-wrapper">
  <div class="page-header">
    <h3 class="page-title"> Size </h3>
    <!-- <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Size</a></li>
        <li class="breadcrumb-item active" aria-current="page">Edit Size</li>
      </ol>
    </nav> -->
  </div>
  <div class="row justify-content-center">
    <div class="col-md-8 col-sm-10 col-12 grid-margin stretch-card">
      <div class="card">
        <div class="card-body">
          <h4 class="card-title" *ngIf="id">Edit Size</h4>
          <h4 class="card-title" *ngIf="!id">Add New Size</h4>
          <div class="alert alert-success alert-dismissable" style="margin-left: 0;" *ngIf="msg_success">
            {{throw_msg}}
          </div>
          <div class="alert alert-danger alert-dismissable" style="margin-left: 0;" *ngIf="msg_danger">
            {{throw_msg}}
          </div>
          <!-- form start -->
          <form [formGroup]="addSizeForm" (ngSubmit)="onSubmit()" method="post" novalidate>
            <div class="box-body">
              <div class="form-group">
                <label for="exampleInputEmail1">Name</label>
                <input type="text" name="name" autocomplete="off" formControlName="name" class="form-control"
                  placeholder="Size Name">
                <span *ngIf="submitted && hasError('name','required')" class="alert-danger">Name is
                  required</span>
              </div>
              <div class="form-group">
                <label for="exampleInputEmail1">Value</label>
                <input type="text" name="value" autocomplete="off" formControlName="value" class="form-control"
                  placeholder="Value">
                <span *ngIf="submitted && hasError('value','required')" class="alert-danger">Value is
                  required</span>
              </div>
              <div class="form-group">
                <label for="exampleInputEmail1">Status</label>
                <select name="action" formControlName="action" class="form-control">
                  <option value="">Select Status</option>
                  <option value="true">Active</option>
                  <option value="false">Deactive</option>
                </select>
                <span *ngIf="submitted && hasError('action','required')" class="alert-danger">Please Select
                  Status</span>
              </div>
            </div>
            <div class="box-footer d-flex">
              <button type="submit" class="btn btn-button mr-2">Submit</button>
              <button type="cancel" (click)="onCancel()" class="btn btn-button">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
