<div class="content-wrapper">
  <div class="page-header">
    <h3 class="page-title"> Customer Group </h3>
  </div>
  <div class="row justify-content-center">
    <div class="col-md-8 col-sm-10 col-12 grid-margin stretch-card">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0" *ngIf="id">Edit Customer Group</h4>
          <h4 class="card-title mb-0" *ngIf="!id">Add New Customer Group</h4>
        </div>
        <div class="card-body">
          
          <div class="alert alert-success alert-dismissable" style="margin-left: 0;" *ngIf="msg_success">
            {{throw_msg}}
          </div>
          <div class="alert alert-danger alert-dismissable" style="margin-left: 0;" *ngIf="msg_danger">
            {{throw_msg}}
          </div>
          <!-- form start -->
          <form [formGroup]="customer_groupForm" (ngSubmit)="onSubmit()" method="post" novalidate>
            <div class="box-body">
              <div class="form-group">
                <label for="exampleInputEmail1">Customer Group Name</label>
                <input type="text" name="name" autocomplete="off" formControlName="name" class="form-control"
                  placeholder="Customer Group Name">
                <span *ngIf="submitted && hasError('name','required')" class="alert-danger">Customer Group Name is
                  required</span>
              </div>
              <div class="form-group">
                <label for="exampleInputEmail1">Role</label>
                <select name="role" formControlName="role" class="form-control">
                  <option value="">Select Role</option>
                  <option value="admin">Admin</option>
                  <option value="user">user</option>
                </select>
              </div>
              <div class="form-group">
                <label for="exampleInputEmail1">Status</label>
                <select name="status" formControlName="status" class="form-control">
                  <option value="true">Active</option>
                  <option value="false">InActive</option>
                </select>
              </div>
            </div>

            <div class="box-footer d-flex">
              <button type="submit" class="btn btn-button mr-2">Submit</button>
              <button type="cancel" (click)="onCancel()" class="btn btn-button">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
