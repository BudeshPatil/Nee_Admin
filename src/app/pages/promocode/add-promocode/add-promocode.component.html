<div class="content-wrapper" >
	<div class="page-header">
		<h3 class="page-title"> PromoCode </h3>
		<!-- <nav aria-label="breadcrumb">
			<ol class="breadcrumb">
				<li class="breadcrumb-item"><a href="#">PromoCode</a></li>
				<li class="breadcrumb-item active" aria-current="page">Edit PromoCode</li>
			</ol>
		</nav> -->
	</div>
	<div class="row justify-content-center">
    <div class="col-md-8 col-sm-10 col-12 grid-margin stretch-card">
      <div class="card">
				<div class="card-header">
					<h4 class="card-title mb-0" *ngIf="id">Edit PromoCode</h4>
          <h4 class="card-title mb-0" *ngIf="!id">Add New PromoCode</h4>
				</div>
        <div class="card-body">
          
          <div class="alert alert-success alert-dismissable" style="margin-left: 0;" *ngIf="msg_success">
						{{throw_msg}}
					</div>
					<div class="alert alert-danger alert-dismissable" style="margin-left: 0;" *ngIf="msg_danger">
						{{throw_msg}}
					</div>
					<!-- form start -->
					<form [formGroup]="addPromoForm" (ngSubmit)="onSubmit()" method="post" novalidate>
						<div class="box-body">

							<div class="form-group">
								<label for="exampleInputEmail1">PromoCode Name</label>
								<input type="text" name="name" autocomplete="off" formControlName="name" class="form-control"
									placeholder="PromoCode Name">
								<span *ngIf="submitted && hasError('name','required')" class="alert-danger">PromoCode Name
									is
									required</span>
								<span *ngIf="submitted && hasError('name','maxlength')" class="alert-danger">Please
									Enter the 30 length PromoCode Name</span>
							</div>

							<div class="form-group">
								<label for="exampleInputEmail1">Groups</label>
								<select name="customer_group" formControlName="customer_group" class="form-control">
									<option value="">Select Groups</option>
									<option value="{{group._id}}" *ngFor="let group of customerGroups; let j = index">
										{{group.name}}</option>
								</select>
								<span *ngIf="submitted && hasError('customer_group','required')" class="alert-danger">Groups is
									required</span>
							</div>

							<div class="form-group">
								<label for="exampleInputEmail1">Code</label>
								<input type="text" name="code" autocomplete="off" formControlName="code" class="form-control"
									placeholder="Promocode">
								<span *ngIf="submitted && hasError('code','required')" class="alert-danger">Scope is
									required</span>
							</div>

							<div class="form-group">
								<label for="exampleInputEmail1">Conditon Subtotal </label>

								<input type="text" name="cond_subtotal" autocomplete="off" formControlName="cond_subtotal"
									class="form-control" placeholder="cond_subtotal">
								<span *ngIf="submitted && hasError('cond_subtotal','required')" class="alert-danger">Description is
									required</span>
							</div>

							<div class="form-group">
								<label for="exampleInputEmail1">Uses per coupon</label>
								<input type="text" name="uses_per_coupon" autocomplete="off" formControlName="uses_per_coupon"
									class="form-control" placeholder="uses_per_coupon">
								<span *ngIf="submitted && hasError('uses_per_coupon','required')" class="alert-danger">Uses Per Coupon
									is required</span>
							</div>

							<div class="form-group">
								<label for="exampleInputEmail1">Discount</label>
								<input type="number" name="discount" autocomplete="off" formControlName="discount" class="form-control"
									placeholder="discount">
								<span *ngIf="submitted && hasError('discount','required')" class="alert-danger">Discount is
									required</span>
							</div>

							<div class="form-group">
								<label for="exampleInputEmail1">From</label>
								<input type="date" name="from" autocomplete="off" formControlName="from" class="form-control"
									placeholder="From date">
								<span *ngIf="submitted && hasError('from','required')" class="alert-danger">From Date is required</span>
							</div>

							<div class="form-group">
								<label for="exampleInputEmail1">To</label>
								<input type="date" name="to" autocomplete="off" formControlName="to" class="form-control"
									placeholder="to">
								<span *ngIf="submitted && hasError('to','required')" class="alert-danger">Discount is required</span>
							</div>

							<div class="form-group">
								<label for="exampleInputEmail1">Action</label>
								<select name="action" formControlName="action" class="form-control">
									<option value="true">Active</option>
									<option value="false">InActive</option>
								</select>
							</div>

						</div>
						<div class="box-footer d-flex">
							<button type="submit" class="btn btn-button mr-2">Submit</button>
							<button type="cancel" (click)="onCancel()" class="btn btn-button">Cancel</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
